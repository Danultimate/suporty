services:

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supporty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supporty}
      POSTGRES_DB: ${POSTGRES_DB:-supporty}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supporty}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── FastAPI application ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-supporty}:${POSTGRES_PASSWORD:-supporty}@db:5432/${POSTGRES_DB:-supporty}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ESCALATION_THRESHOLD: ${ESCALATION_THRESHOLD:-0.75}
      RAG_TOP_K: ${RAG_TOP_K:-5}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
      - external

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    build:
      context: ./docker
      dockerfile: nginx.Dockerfile
    restart: unless-stopped
    ports:
      - "8437:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - external

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
