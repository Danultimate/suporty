services:

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supporty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supporty}
      POSTGRES_DB: ${POSTGRES_DB:-supporty}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supporty}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Ollama (local LLM) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # GPU support: uncomment if VPS has NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal

  # ── Ollama model bootstrapper (runs once) ──────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        ollama pull ${LOCAL_LLM_MODEL:-mistral} &&
        echo 'Model pulled successfully'
      "
    environment:
      OLLAMA_HOST: http://ollama:11434
    networks:
      - internal
    restart: "no"

  # ── FastAPI application ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-supporty}:${POSTGRES_PASSWORD:-supporty}@db:5432/${POSTGRES_DB:-supporty}
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - internal
      - external

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for TLS:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - external

volumes:
  pgdata:
  ollama_data:

networks:
  internal:
    driver: bridge
    internal: true   # app ↔ db ↔ ollama isolated; no direct internet
  external:
    driver: bridge
